<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/layout}">
<head>
  <!-- 個別CSS読み込み -->
  <link rel="stylesheet" th:href="@{/css/list.css}">
  <title>ユーザー一覧</title>
</head>
<body>
  <div layout:fragment="content">
    <div class="header border-bottom">
      <h1 class="h2">ユーザー一覧画面</h1>
    </div>
    <!-- 検索 -->
    <div class="mb-4">
      <form id="user-search-form" method="get" th:action="@{/user/list}"
          class="row" th:object="${userListForm}">
        <div class="col-sm">
          <input type="text" class="form-control" placeholder="ユーザーID" th:field="*{userId}">
        </div>
        <div class="col-sm">
          <input type="text" class="form-control" placeholder="ユーザー名" th:field="*{userName}">
        </div>
        <div class="col-sm">
          <button class="btn btn-primary" type="submit">
            検索
          </button>
        </div>
      </form>
    </div>
    <!-- 一覧表示 -->
    <div>
      <table class="table table-striped table-bordered table-hover">
        <thead>
          <tr class="table-primary">
            <th class="th-width">ユーザーID</th>
            <th class="th-width">ユーザー名</th>
            <th class="th-width">誕生日</th>
            <th class="th-width">年齢</th>
            <th class="th-width">性別</th>
            <th class="th-width"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item: ${userList}">
            <td th:text="${item.userId}"></td>
            <td th:text="${item.userName}"></td>
            <td th:text="${#dates.format(item.birthday, 'YYYY/MM/dd')}"></td>
            <td th:text="${item.age}"></td>
            <td th:text="${item.gender == 1} ? '男性': '女性'"></td>
            <td>
              <a class="btn btn-primary" th:href="@{'/user/detail/' + ${item.userId}}">
                詳細
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
